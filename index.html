<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ZenStream | Music & Video Sharing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 10% 20%,#0a0c18,#020308);color:#edeef2;min-height:100vh;padding:1rem;}.app{max-width:1400px;margin:0 auto;background:rgba(12,14,28,0.7);backdrop-filter:blur(18px);border-radius:2rem;border:1px solid rgba(255,255,255,0.08);overflow:hidden;}.progress-container{width:100%;height:4px;background:#2a2e50;display:none;}.upload-progress{width:0%;height:100%;background:linear-gradient(90deg,#8b92e8,#6c5ce7);transition:width .2s;}.navbar{padding:.8rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(6,8,16,0.7);}.logo h1{font-size:1.5rem;background:linear-gradient(135deg,#fff,#b7b2ff);-webkit-background-clip:text;background-clip:text;color:transparent;}.logo span{font-size:.65rem;color:#9da3d4;display:block;}.nav-links{display:flex;gap:.8rem;align-items:center;}.nav-btn{background:transparent;border:none;font-size:.9rem;font-weight:500;color:#cfd5ff;cursor:pointer;padding:.4rem 1rem;border-radius:2rem;display:flex;align-items:center;gap:6px;transition:.2s;}.nav-btn.active,.nav-btn:hover{background:#6c5ce7;color:white;}.auth-btn{background:#2d325a;padding:.35rem 1rem;border-radius:2rem;border:none;color:white;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:6px;}.pane{display:none;padding:1.5rem;animation:fade .2s ease;}.pane.active-pane{display:block;}@keyframes fade{from{opacity:0;}to{opacity:1;}}.filter-tabs{display:flex;gap:.8rem;margin-bottom:1.5rem;border-bottom:1px solid #2a2e50;padding-bottom:.4rem;}.filter-btn{background:none;border:none;color:#b7bef0;font-size:.9rem;font-weight:500;cursor:pointer;padding:.25rem .8rem;border-radius:2rem;}.filter-btn.active-filter{background:#6c5ce7;color:white;}.search-section{margin-bottom:1.5rem;position:relative;}.search-wrapper{display:flex;gap:.5rem;background:#181c30b3;border-radius:2rem;align-items:center;padding:.1rem .3rem .1rem 1rem;height:34px;}.search-wrapper i{color:#9ca3e0;font-size:.8rem;}#searchInput{flex:1;background:transparent;border:none;padding:.2rem 0;color:white;font-size:.85rem;outline:none;}.suggestions-box{position:absolute;top:40px;left:0;width:100%;background:#12142ad9;backdrop-filter:blur(12px);border-radius:1rem;max-height:250px;overflow-y:auto;z-index:100;border:1px solid #3d4270;display:none;}.suggestion-item{padding:.6rem 1rem;cursor:pointer;border-bottom:1px solid #2a2e55;font-size:.85rem;}.suggestion-item:hover{background:#2d325b;}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;margin-bottom:1.5rem;}.song-card{background:rgba(24,27,52,0.8);border-radius:1rem;overflow:hidden;transition:.2s;cursor:pointer;}.song-card:hover{transform:translateY(-4px);background:#2d325b;}.cover-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#1e213f;}.card-info{padding:.7rem;}.song-title{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.song-artist{font-size:.7rem;color:#b6bdf0;margin:3px 0;}.card-stats{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:.65rem;}.watch-btn,.download-btn{background:none;border:none;color:#cfd6ff;cursor:pointer;padding:3px 6px;border-radius:20px;font-size:.7rem;}.upload-trigger{background:#6c5ce7;border:none;padding:.6rem 1.5rem;border-radius:2.5rem;font-weight:600;color:white;cursor:pointer;margin-bottom:1.2rem;display:inline-flex;align-items:center;gap:8px;font-size:.9rem;}.wizard-step{background:rgba(20,22,44,0.9);border-radius:1.2rem;padding:1.2rem;margin-bottom:1.5rem;border:1px solid #4a4f82;display:none;}.wizard-step.active-step{display:block;}.form-group{margin-bottom:.8rem;display:flex;flex-direction:column;gap:5px;}.form-group label{font-weight:500;font-size:.85rem;}.form-group input{background:#0f1122;border:1px solid #42477a;border-radius:1rem;padding:.6rem 1rem;color:white;font-size:.85rem;}.btn-primary{background:#6c5ce7;border:none;padding:.6rem 1rem;border-radius:2rem;font-weight:600;color:white;cursor:pointer;font-size:.85rem;}.media-buttons{display:flex;gap:.8rem;flex-wrap:wrap;margin:.8rem 0;}.media-picker-btn{flex:1;background:#2d325a;border:none;padding:.6rem .8rem;border-radius:2rem;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.85rem;}.review-details{background:#181c30;border-radius:1rem;padding:.8rem;margin:.8rem 0;font-size:.8rem;}.review-item{display:flex;gap:.8rem;margin-bottom:.5rem;align-items:center;}.cover-preview{width:50px;height:50px;object-fit:cover;border-radius:.6rem;}.my-songs-list{max-height:350px;overflow-y:auto;margin-top:.8rem;}.my-song-item{background:rgba(28,31,58,0.7);border-radius:.8rem;padding:.6rem;display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.8rem;flex-wrap:wrap;gap:.5rem;}.delete-song-btn{background:#3a2a3c;border:none;color:#ffaeae;padding:.25rem .6rem;border-radius:1.5rem;cursor:pointer;font-size:.7rem;}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;justify-content:center;align-items:center;}.modal-content video{max-width:90%;max-height:80vh;border-radius:1rem;}.close-modal{position:absolute;top:20px;right:30px;font-size:2rem;color:white;cursor:pointer;}.player-bar{background:#05070fe6;backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.1);padding:.4rem 1.5rem;display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;font-size:.8rem;}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2342;backdrop-filter:blur(16px);padding:.4rem 1rem;border-radius:40px;z-index:1100;font-size:.8rem;}.auth-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:3000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:.2s;}.auth-modal.active{visibility:visible;opacity:1;}.auth-card{background:#14172b;border-radius:1.5rem;padding:1.5rem;width:90%;max-width:350px;border:1px solid #6c5ce7;}.auth-card h3{margin-bottom:1rem;text-align:center;font-size:1.2rem;}.auth-card input{width:100%;margin-bottom:.8rem;padding:.6rem;border-radius:1rem;background:#0a0c1a;border:1px solid #3d4270;color:white;}.auth-card button{width:100%;margin-top:.3rem;}.toggle-auth{text-align:center;margin-top:.8rem;font-size:.75rem;cursor:pointer;color:#b7b2ff;}@media (max-width:600px){.navbar{padding:.6rem 1rem;}.pane{padding:1rem;}.cards-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}}
  </style>
</head>
<body>
<div class="app">
  <div class="progress-container" id="progressContainer"><div class="upload-progress" id="uploadProgressFill"></div></div>
  <div class="navbar">
    <div class="logo"><h1>🎧 ZenStream</h1><span>Zambia · search · vibe</span></div>
    <div class="nav-links">
      <button class="nav-btn active" id="homeNavBtn"><i class="fas fa-home"></i> Home</button>
      <button class="nav-btn" id="profileNavBtn"><i class="fas fa-user-astronaut"></i> Profile</button>
      <button id="authBtn" class="auth-btn"><i class="fas fa-envelope"></i> Sign in</button>
    </div>
  </div>
  <div id="homePane" class="pane active-pane">
    <div class="search-section">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by title or artist..." autocomplete="off">
        <button class="clear-search" id="clearHomeSearch"><i class="fas fa-times-circle"></i></button>
      </div>
      <div id="suggestionsBox" class="suggestions-box"></div>
    </div>
    <div class="filter-tabs">
      <button class="filter-btn active-filter" data-filter="all">All</button>
      <button class="filter-btn" data-filter="audio">Audio</button>
      <button class="filter-btn" data-filter="video">Video</button>
    </div>
    <div class="section-title"><i class="fas fa-fire"></i> Most Played 🔥</div>
    <div class="cards-grid" id="trendingGrid"></div>
    <div class="section-title" id="filterSectionTitle"><i class="fas fa-globe"></i> All Music & Videos</div>
    <div class="cards-grid" id="filteredGrid"></div>
  </div>
  <div id="profilePane" class="pane">
    <button id="showUploadWizardBtn" class="upload-trigger"><i class="fas fa-plus-circle"></i> Share new track</button>
    <div id="step1" class="wizard-step active-step">
      <div class="form-group"><label>Artist name *</label><input type="text" id="wizardArtist" placeholder="e.g., DJ Zambia"></div>
      <div class="form-group"><label>Song / Video title *</label><input type="text" id="wizardTitle" placeholder="e.g., Afro King"></div>
      <button id="enterDetailsBtn" class="btn-primary">Next →</button>
    </div>
    <div id="step2" class="wizard-step">
      <p><strong>Choose media type</strong></p>
      <div class="media-buttons"><button id="audioPickerBtn" class="media-picker-btn"><i class="fas fa-music"></i> Audio</button><button id="videoPickerBtn" class="media-picker-btn"><i class="fas fa-video"></i> Video</button></div>
      <div id="mediaFileInfo" style="margin-top:.8rem;"></div>
      <button id="mediaNextBtn" class="btn-primary" style="margin-top:.8rem;" disabled>Continue →</button>
    </div>
    <div id="step3" class="wizard-step">
      <p><strong>Cover image (optional)</strong></p>
      <div style="display:flex; gap:.8rem; flex-wrap:wrap; margin:.8rem 0;"><button id="setCoverBtn" class="media-picker-btn" style="flex:1;"><i class="fas fa-image"></i> Set Cover</button><button id="continueNoCoverBtn" class="btn-primary">Continue without cover</button></div>
      <div id="coverInfo"></div>
      <button id="continueWithCoverBtn" class="btn-primary" style="margin-top:.5rem;" disabled>Continue with cover</button>
    </div>
    <div id="step4" class="wizard-step">
      <p><strong>Review & Publish</strong></p>
      <div id="reviewDetails" class="review-details"></div>
      <button id="finalUploadBtn" class="btn-primary"><i class="fas fa-cloud-upload-alt"></i> Upload to cloud</button>
      <button id="cancelUploadBtn" class="btn-primary" style="background:#3a2f54; margin-left:.5rem;">Cancel</button>
    </div>
    <h3 style="font-size:1.1rem;"><i class="fas fa-music"></i> My uploaded tracks (public)</h3>
    <div id="myUploadsList" class="my-songs-list"></div>
  </div>
  <div class="player-bar" id="globalPlayer" style="display: none;">
    <span style="font-size:.7rem;">🎵 Now</span>
    <span id="playerTrackName" style="flex:1; font-size:.8rem;">—</span>
    <button id="playerPrev" style="background:none; border:none; color:white;"><i class="fas fa-backward-step"></i></button>
    <button id="playerPlayPause" style="background:#6c5ce7; border:none; width:32px; height:32px; border-radius:50%; color:white;"><i class="fas fa-play"></i></button>
    <button id="playerNext" style="background:none; border:none; color:white;"><i class="fas fa-forward-step"></i></button>
    <div style="display:flex; gap:4px; align-items:center; width:140px;"><span id="playerCurrentTime">0:00</span><div class="progress-bar" style="flex:1; height:3px; background:#2e3460; cursor:pointer;"><div id="playerProgressFill" style="height:100%; width:0%; background:#8b92e8;"></div></div><span id="playerDuration">0:00</span></div>
    <i class="fas fa-volume-down"></i><input type="range" id="playerVolume" min="0" max="1" step="0.01" value="0.7" style="width:60px;">
  </div>
</div>
<div id="videoModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><video id="modalVideo" controls></video></div></div>
<div id="authModal" class="auth-modal"><div class="auth-card"><h3 id="authTitle">Sign in to upload</h3><input type="email" id="emailInput" placeholder="Email address"><input type="password" id="passwordInput" placeholder="Password"><button id="authSubmitBtn" class="btn-primary">Sign in</button><div class="toggle-auth" id="toggleAuthMode">Don't have an account? Sign up</div><div class="toggle-auth" id="closeAuthModal">Cancel</div></div></div>

<script>
// FIREBASE CONFIG
const firebaseConfig = { apiKey: "AIzaSyALqMaRLvPz_S6v_UWKVaWl0Yod701lsUI", authDomain: "projectrunaway2010.firebaseapp.com", projectId: "projectrunaway2010", storageBucket: "projectrunaway2010.firebasestorage.app", messagingSenderId: "797776068841", appId: "1:797776068841:web:80e2c95800a71ff383b078" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// CLOUDINARY CONFIG - UPDATED WITH YOUR PRESET NAME
const CLOUD_NAME = "djyuhmqeb";
const UPLOAD_PRESET = "Zenskm music";  // ← Updated to your preset name

// --- GLOBAL VARIABLES ---
let allSongs = [];
let audioElement = new Audio();
let currentSongId = null;
let audioQueue = [];
let audioIndex = -1;
let currentUser = null;
let currentFilter = "all";
let currentSearch = "";

// --- DOM ELEMENTS ---
const homePane = document.getElementById('homePane');
const profilePane = document.getElementById('profilePane');
const homeBtn = document.getElementById('homeNavBtn');
const profileBtn = document.getElementById('profileNavBtn');
const authBtn = document.getElementById('authBtn');
const trendingGrid = document.getElementById('trendingGrid');
const filteredGrid = document.getElementById('filteredGrid');
const searchInput = document.getElementById('searchInput');
const suggestionsBox = document.getElementById('suggestionsBox');
const clearSearchBtn = document.getElementById('clearHomeSearch');

// --- HELPER FUNCTIONS ---
function showToast(msg) { let t = document.querySelector('.toast'); if (t) t.remove(); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function formatTime(sec) { if (isNaN(sec)) return "0:00"; const m = Math.floor(sec/60); const s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }

// --- NAVIGATION ---
function setActivePane(pane) {
  if (pane === 'home') {
    homePane.classList.add('active-pane');
    profilePane.classList.remove('active-pane');
    homeBtn.classList.add('active');
    profileBtn.classList.remove('active');
    renderHome();
  } else {
    profilePane.classList.add('active-pane');
    homePane.classList.remove('active-pane');
    profileBtn.classList.add('active');
    homeBtn.classList.remove('active');
    renderProfileUploads();
  }
}
homeBtn.onclick = () => setActivePane('home');
profileBtn.onclick = () => setActivePane('profile');

// --- AUTHENTICATION MODAL ---
const authModalEl = document.getElementById('authModal');
const authTitle = document.getElementById('authTitle');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const authSubmitBtn = document.getElementById('authSubmitBtn');
const toggleAuthMode = document.getElementById('toggleAuthMode');
const closeAuthModal = document.getElementById('closeAuthModal');
let isSignUp = false;

function openAuthModal() { authModalEl.classList.add('active'); }
function closeAuthModalFunc() { authModalEl.classList.remove('active'); emailInput.value = ''; passwordInput.value = ''; }
async function handleAuth() {
  const email = emailInput.value.trim();
  const pwd = passwordInput.value;
  if (!email || !pwd) { showToast('Please enter email and password'); return; }
  try {
    if (isSignUp) { await auth.createUserWithEmailAndPassword(email, pwd); showToast('Account created! You can now upload.'); }
    else { await auth.signInWithEmailAndPassword(email, pwd); showToast('Signed in successfully'); }
    closeAuthModalFunc();
  } catch (err) { showToast(err.message); }
}
toggleAuthMode.onclick = () => {
  isSignUp = !isSignUp;
  authTitle.innerText = isSignUp ? 'Sign up to upload' : 'Sign in to upload';
  toggleAuthMode.innerText = isSignUp ? 'Already have an account? Sign in' : "Don't have an account? Sign up";
  authSubmitBtn.innerText = isSignUp ? 'Sign up' : 'Sign in';
};
authSubmitBtn.onclick = handleAuth;
closeAuthModal.onclick = closeAuthModalFunc;
authBtn.onclick = openAuthModal;

// --- LOAD SONGS FROM FIRESTORE ---
function loadSongs() {
  db.collection('songs').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
    allSongs = [];
    snapshot.forEach(doc => { allSongs.push({ id: doc.id, ...doc.data() }); });
    renderHome();
    renderProfileUploads();
  });
}

async function incrementPlayCount(songId) {
  const songRef = db.collection('songs').doc(songId);
  await songRef.update({ playCount: firebase.firestore.FieldValue.increment(1) });
}

// --- RENDER HOME PAGE ---
function renderHome() {
  let filtered = allSongs;
  if (currentFilter === 'audio') filtered = allSongs.filter(s => s.mediaType === 'audio');
  else if (currentFilter === 'video') filtered = allSongs.filter(s => s.mediaType === 'video');
  if (currentSearch.trim()) {
    const term = currentSearch.toLowerCase();
    filtered = filtered.filter(s => s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term));
  }
  const trending = [...allSongs].sort((a,b) => (b.playCount||0) - (a.playCount||0)).slice(0,6);
  trendingGrid.innerHTML = trending.map(s => createSongCard(s)).join('');
  filteredGrid.innerHTML = filtered.map(s => createSongCard(s)).join('');
  attachCardEvents();
}

function createSongCard(song) {
  const cover = song.coverURL ? `<img class="cover-img" src="${song.coverURL}" alt="cover">` : `<div class="cover-img" style="display:flex;align-items:center;justify-content:center;background:#2a2e54;"><i class="fas fa-music" style="font-size:2rem;"></i></div>`;
  return `<div class="song-card" data-id="${song.id}">${cover}<div class="card-info"><div class="song-title">${escapeHtml(song.title)}</div><div class="song-artist">${escapeHtml(song.artist)}</div><div class="card-stats"><span><i class="fas fa-headphones"></i> ${song.playCount || 0}</span><div><button class="watch-btn" data-id="${song.id}"><i class="fas ${song.mediaType === 'audio' ? 'fa-play-circle' : 'fa-video'}"></i> ${song.mediaType === 'audio' ? 'Play' : 'Watch'}</button><button class="download-btn" data-id="${song.id}"><i class="fas fa-download"></i></button></div></div></div></div>`;
}

function attachCardEvents() {
  document.querySelectorAll('.watch-btn').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const song = allSongs.find(s => s.id === id);
      if (song) {
        await incrementPlayCount(song.id);
        if (song.mediaType === 'audio') playAudio(song);
        else openVideoModal(song.mediaURL);
      }
    };
  });
  document.querySelectorAll('.download-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const song = allSongs.find(s => s.id === id);
      if (song) {
        const a = document.createElement('a');
        a.href = song.mediaURL;
        a.download = `${song.title}.${song.mediaURL.split('.').pop()}`;
        a.click();
        showToast(`Downloading ${song.title}`);
      }
    };
  });
}

// --- AUDIO PLAYER ---
function playAudio(song) {
  if (currentSongId === song.id && !audioElement.paused) return;
  currentSongId = song.id;
  audioElement.src = song.mediaURL;
  audioElement.load();
  audioElement.play();
  document.getElementById('globalPlayer').style.display = 'flex';
  document.getElementById('playerTrackName').innerText = `${song.title} - ${song.artist}`;
  updatePlayPauseUI();
  audioQueue = allSongs.filter(s => s.mediaType === 'audio').map(s => s.id);
  audioIndex = audioQueue.findIndex(id => id === song.id);
}
function updatePlayPauseUI() { const btn = document.getElementById('playerPlayPause'); btn.innerHTML = audioElement.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>'; }
function setupAudioEvents() {
  audioElement.onplay = updatePlayPauseUI;
  audioElement.onpause = updatePlayPauseUI;
  audioElement.ontimeupdate = () => { if (audioElement.duration) { document.getElementById('playerProgressFill').style.width = (audioElement.currentTime / audioElement.duration) * 100 + '%'; document.getElementById('playerCurrentTime').innerText = formatTime(audioElement.currentTime); } };
  audioElement.onloadedmetadata = () => { document.getElementById('playerDuration').innerText = formatTime(audioElement.duration); };
  audioElement.onended = () => playNextAudio();
  document.getElementById('playerPlayPause').onclick = () => audioElement.paused ? audioElement.play() : audioElement.pause();
  document.getElementById('playerPrev').onclick = () => playPrevAudio();
  document.getElementById('playerNext').onclick = () => playNextAudio();
  document.getElementById('playerVolume').oninput = (e) => audioElement.volume = e.target.value;
  audioElement.volume = 0.7;
  const progBar = document.querySelector('#globalPlayer .progress-bar');
  if (progBar) progBar.onclick = (e) => { const rect = progBar.getBoundingClientRect(); const percent = (e.clientX - rect.left) / rect.width; if (audioElement.duration) audioElement.currentTime = percent * audioElement.duration; };
}
function playNextAudio() { if (audioQueue.length === 0) return; if (audioIndex === -1) audioIndex = 0; let nextIdx = (audioIndex + 1) % audioQueue.length; const nextSong = allSongs.find(s => s.id === audioQueue[nextIdx]); if (nextSong) playAudio(nextSong); }
function playPrevAudio() { if (audioQueue.length === 0) return; if (audioIndex === -1) audioIndex = 0; let prevIdx = (audioIndex - 1 + audioQueue.length) % audioQueue.length; const prevSong = allSongs.find(s => s.id === audioQueue[prevIdx]); if (prevSong) playAudio(prevSong); }
function openVideoModal(url) { const modal = document.getElementById('videoModal'); const video = document.getElementById('modalVideo'); video.src = url; modal.style.display = 'flex'; video.play(); }
document.querySelector('.close-modal').onclick = () => { document.getElementById('videoModal').style.display = 'none'; document.getElementById('modalVideo').pause(); };

// --- PROFILE: MY UPLOADS ---
async function renderProfileUploads() {
  if (!currentUser) { document.getElementById('myUploadsList').innerHTML = '<div class="empty-msg">Sign in to see your uploads.</div>'; return; }
  const snapshot = await db.collection('songs').where('userId', '==', currentUser.uid).get();
  const mySongs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  const container = document.getElementById('myUploadsList');
  if (!mySongs.length) { container.innerHTML = '<div class="empty-msg">You haven\'t uploaded anything yet.</div>'; return; }
  container.innerHTML = mySongs.map(song => `<div class="my-song-item"><div><i class="fas ${song.mediaType === 'audio' ? 'fa-music' : 'fa-video'}"></i> <strong>${escapeHtml(song.title)}</strong> - ${escapeHtml(song.artist)} (${song.playCount||0} plays)</div><button class="delete-song-btn" data-id="${song.id}"><i class="fas fa-trash"></i> Delete</button></div>`).join('');
  document.querySelectorAll('.delete-song-btn').forEach(btn => { btn.onclick = async () => { const id = btn.getAttribute('data-id'); if (confirm('Delete permanently?')) { await db.collection('songs').doc(id).delete(); showToast('Deleted from library'); } }; });
}

// --- UPLOAD WIZARD (Cloudinary) ---
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', UPLOAD_PRESET);
  fd.append('resource_type', 'auto');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: fd });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}

let wizardData = { artist: '', title: '', mediaFile: null, mediaType: '', coverFile: null };
function resetWizard() {
  wizardData = { artist: '', title: '', mediaFile: null, mediaType: '', coverFile: null };
  document.getElementById('wizardArtist').value = '';
  document.getElementById('wizardTitle').value = '';
  document.getElementById('mediaFileInfo').innerHTML = '';
  document.getElementById('coverInfo').innerHTML = '';
  document.getElementById('mediaNextBtn').disabled = true;
  document.getElementById('continueWithCoverBtn').disabled = true;
  document.getElementById('step1').classList.add('active-step');
  document.getElementById('step2').classList.remove('active-step');
  document.getElementById('step3').classList.remove('active-step');
  document.getElementById('step4').classList.remove('active-step');
  document.getElementById('step1').style.display = 'block';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'none';
}
document.getElementById('showUploadWizardBtn').onclick = () => { if(currentUser) resetWizard(); else showToast('Please sign in first'); };
document.getElementById('enterDetailsBtn').onclick = () => {
  const artist = document.getElementById('wizardArtist').value.trim();
  const title = document.getElementById('wizardTitle').value.trim();
  if (!artist || !title) { showToast('Artist and title required'); return; }
  wizardData.artist = artist;
  wizardData.title = title;
  document.getElementById('step1').classList.remove('active-step');
  document.getElementById('step2').classList.add('active-step');
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
};
function triggerMediaPicker(type) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = type === 'audio' ? 'audio/*' : 'video/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      wizardData.mediaFile = file;
      wizardData.mediaType = type;
      document.getElementById('mediaFileInfo').innerHTML = `<i class="fas fa-check"></i> ${file.name}`;
      document.getElementById('mediaNextBtn').disabled = false;
    }
  };
  input.click();
}
document.getElementById('audioPickerBtn').onclick = () => triggerMediaPicker('audio');
document.getElementById('videoPickerBtn').onclick = () => triggerMediaPicker('video');
document.getElementById('mediaNextBtn').onclick = () => {
  if (!wizardData.mediaFile) return;
  document.getElementById('step2').classList.remove('active-step');
  document.getElementById('step3').classList.add('active-step');
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';
};
document.getElementById('setCoverBtn').onclick = () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      wizardData.coverFile = file;
      document.getElementById('coverInfo').innerHTML = `<i class="fas fa-check"></i> ${file.name}`;
      document.getElementById('continueWithCoverBtn').disabled = false;
    }
  };
  input.click();
};
document.getElementById('continueNoCoverBtn').onclick = () => { wizardData.coverFile = null; goToReview(); };
document.getElementById('continueWithCoverBtn').onclick = () => { if(wizardData.coverFile) goToReview(); };
function goToReview() {
  document.getElementById('step3').classList.remove('active-step');
  document.getElementById('step4').classList.add('active-step');
  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'block';
  const reviewDiv = document.getElementById('reviewDetails');
  let coverHtml = wizardData.coverFile ? `<img class="cover-preview" src="${URL.createObjectURL(wizardData.coverFile)}">` : '<div style="width:50px;height:50px;background:#2a2e54;"></div>';
  reviewDiv.innerHTML = `<div><strong>Artist:</strong> ${escapeHtml(wizardData.artist)}</div><div><strong>Title:</strong> ${escapeHtml(wizardData.title)}</div><div><strong>Type:</strong> ${wizardData.mediaType}</div><div><strong>File:</strong> ${escapeHtml(wizardData.mediaFile.name)}</div><div><strong>Cover:</strong> ${wizardData.coverFile ? wizardData.coverFile.name : 'None'}</div><div>${coverHtml}</div>`;
}
document.getElementById('finalUploadBtn').onclick = async () => {
  if (!currentUser) { showToast('You must be signed in'); return; }
  const progressContainer = document.getElementById('progressContainer');
  const progressFill = document.getElementById('uploadProgressFill');
  progressContainer.style.display = 'block';
  progressFill.style.width = '0%';
  let progress = 0;
  const interval = setInterval(() => { progress += 10; if (progress<90) progressFill.style.width = progress+'%'; }, 100);
  try {
    const mediaURL = await uploadToCloudinary(wizardData.mediaFile);
    let coverURL = null;
    if (wizardData.coverFile) coverURL = await uploadToCloudinary(wizardData.coverFile);
    const songData = { title: wizardData.title, artist: wizardData.artist, mediaType: wizardData.mediaType, mediaURL, coverURL, playCount: 0, timestamp: firebase.firestore.FieldValue.serverTimestamp(), userId: currentUser.uid };
    await db.collection('songs').add(songData);
    clearInterval(interval);
    progressFill.style.width = '100%';
    setTimeout(() => { progressContainer.style.display = 'none'; showToast('Upload complete!'); resetWizard(); document.getElementById('step4').style.display = 'none'; document.getElementById('step1').style.display = 'block'; }, 500);
  } catch (err) { clearInterval(interval); progressContainer.style.display = 'none'; showToast('Upload failed: ' + err.message); }
};
document.getElementById('cancelUploadBtn').onclick = () => resetWizard();

// --- SEARCH & FILTERS ---
function updateSuggestions() {
  const term = searchInput.value.trim().toLowerCase();
  if (!term) { suggestionsBox.style.display = 'none'; return; }
  const matches = allSongs.filter(s => s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term)).slice(0,6);
  if (!matches.length) { suggestionsBox.style.display = 'none'; return; }
  suggestionsBox.innerHTML = matches.map(s => `<div class="suggestion-item" data-search="${escapeHtml(s.title)}">${escapeHtml(s.title)} — ${escapeHtml(s.artist)}</div>`).join('');
  suggestionsBox.style.display = 'block';
  document.querySelectorAll('.suggestion-item').forEach(el => { el.onclick = () => { searchInput.value = el.getAttribute('data-search'); currentSearch = searchInput.value; renderHome(); suggestionsBox.style.display = 'none'; }; });
}
searchInput.oninput = (e) => { currentSearch = e.target.value; renderHome(); updateSuggestions(); };
if (clearSearchBtn) clearSearchBtn.onclick = () => { searchInput.value = ''; currentSearch = ''; renderHome(); suggestionsBox.style.display = 'none'; };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
    btn.classList.add('active-filter');
    currentFilter = btn.getAttribute('data-filter');
    renderHome();
  };
});
document.addEventListener('click', (e) => { if (!e.target.closest('.search-section')) suggestionsBox.style.display = 'none'; });

// --- AUTH STATE OBSERVER ---
auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    authBtn.innerHTML = `<i class="fas fa-envelope"></i> ${user.email}`;
    document.getElementById('showUploadWizardBtn').style.display = 'inline-flex';
  } else {
    authBtn.innerHTML = '<i class="fas fa-envelope"></i> Sign in';
    document.getElementById('showUploadWizardBtn').style.display = 'none';
  }
  renderProfileUploads();
});

// --- INIT ---
setupAudioEvents();
loadSongs();
setActivePane('home');
</script>
